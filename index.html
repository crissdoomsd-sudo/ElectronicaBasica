<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber-Lab | Inmersión Electrónica</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0a0e17;
            --bg-panel: #111827;
            --bg-card: #1f2937;
            --neon-cyan: #06b6d4;
            --neon-purple: #a855f7;
            --neon-green: #10b981;
            --neon-orange: #f59e0b;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        
        body { background-color: var(--bg-dark); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }

        /* Scrollbar Cyberpunk */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-panel); }
        ::-webkit-scrollbar-thumb { background: var(--neon-cyan); border-radius: 4px; }

        /* Sidebar */
        .sidebar { width: 300px; background: var(--bg-panel); border-right: 1px solid #334155; display: flex; flex-direction: column; padding: 20px 0; overflow-y: auto; box-shadow: 5px 0 15px rgba(0,0,0,0.5); z-index: 10; }
        .logo { padding: 0 20px 30px; border-bottom: 1px solid #334155; margin-bottom: 20px; }
        .logo h1 { font-size: 1.8rem; background: linear-gradient(90deg, var(--neon-cyan), var(--neon-purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-transform: uppercase; letter-spacing: 2px; }
        .logo p { color: var(--text-muted); font-size: 0.8rem; margin-top: 5px; }
        
        .nav-item { display: flex; align-items: center; padding: 15px 25px; color: var(--text-muted); cursor: pointer; transition: all 0.3s; border-left: 4px solid transparent; font-size: 0.95rem; }
        .nav-item:hover { background: rgba(6, 182, 212, 0.1); color: var(--text-main); }
        .nav-item.active { background: rgba(6, 182, 212, 0.1); color: var(--neon-cyan); border-left-color: var(--neon-cyan); }
        .nav-item i { margin-right: 15px; font-size: 1.1rem; width: 20px; text-align: center; }
        
        .nav-section { padding: 10px 25px; color: var(--neon-purple); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; margin-top: 10px; }

        /* Main Content */
        .main { flex: 1; overflow-y: auto; padding: 40px 50px; background: radial-gradient(circle at top right, #1e1b4b, var(--bg-dark)); }
        
        .header { margin-bottom: 30px; animation: fadeIn 0.5s ease; }
        .header h1 { font-size: 2.8rem; color: var(--neon-cyan); text-shadow: 0 0 20px rgba(6, 182, 212, 0.4); margin-bottom: 10px; }
        .header p { color: var(--text-muted); font-size: 1.1rem; line-height: 1.6; max-width: 800px; }

        .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; animation: slideUp 0.6s ease; }

        .card { background: var(--bg-card); border-radius: 15px; padding: 25px; border: 1px solid #334155; position: relative; overflow: hidden; transition: transform 0.3s, box-shadow 0.3s; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.5); border-color: var(--neon-purple); }
        .card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: linear-gradient(90deg, var(--neon-cyan), var(--neon-purple)); }
        
        .card-title { font-size: 1.2rem; color: var(--neon-cyan); margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        .card-text { color: var(--text-muted); line-height: 1.7; font-size: 0.95rem; text-align: justify; }
        .card-text strong { color: var(--neon-green); }

        /* Imagen */
        .image-card { grid-column: span 2; background: #050811; border: 1px dashed var(--neon-purple); display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 300px; position: relative; }
        .image-card img { max-width: 90%; max-height: 250px; object-fit: contain; filter: drop-shadow(0 0 15px rgba(168, 85, 247, 0.6)); transition: transform 0.5s; }
        .image-card img:hover { transform: scale(1.05); }
        .placeholder-img { color: var(--neon-purple); text-align: center; }
        .placeholder-img i { font-size: 3rem; margin-bottom: 10px; display: block; }

        /* Desafío */
        .challenge-card { grid-column: span 2; background: linear-gradient(135deg, #1e293b, #0f172a); border: 1px solid var(--neon-orange); }
        .challenge-card::before { background: var(--neon-orange); }
        .challenge-card .card-title { color: var(--neon-orange); }
        .btn-solve { background: transparent; border: 1px solid var(--neon-orange); color: var(--neon-orange); padding: 8px 15px; border-radius: 5px; cursor: pointer; margin-top: 15px; font-weight: bold; transition: all 0.3s; }
        .btn-solve:hover { background: var(--neon-orange); color: var(--bg-dark); }

        /* Modal */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); z-index: 100; display: none; align-items: center; justify-content: center; }
        .modal-content { background: var(--bg-panel); border: 1px solid var(--neon-green); border-radius: 15px; padding: 30px; max-width: 500px; width: 90%; text-align: center; animation: popIn 0.3s ease; }
        .modal-content h3 { color: var(--neon-green); margin-bottom: 15px; font-size: 1.5rem; }
        .modal-content p { color: var(--text-main); margin-bottom: 25px; line-height: 1.6; }
        .btn-close { background: var(--neon-green); color: var(--bg-dark); border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 1rem; }

        /* Animaciones */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        @media (max-width: 768px) {
            .sidebar { width: 70px; padding: 10px 0; }
            .logo h1, .logo p, .nav-item span, .nav-section { display: none; }
            .nav-item { justify-content: center; padding: 15px; border-left: none; border-bottom: 4px solid transparent; }
            .nav-item.active { border-bottom-color: var(--neon-cyan); border-left: none; }
            .nav-item i { margin-right: 0; font-size: 1.3rem; }
            .main { padding: 20px; }
            .image-card, .challenge-card { grid-column: span 1; }
            .header h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <!-- Barra Lateral de Navegación -->
    <aside class="sidebar">
        <div class="logo">
            <h1><i class="fas fa-bolt"></i> Cyber-Lab</h1>
            <p>Inmersión Electrónica</p>
        </div>
        
        <div class="nav-section">Componentes</div>
        <div class="nav-item active" onclick="loadTopic(0)"><i class="fas fa-atom"></i><span>Electrónica Básica</span></div>
        <div class="nav-item" onclick="loadTopic(1)"><i class="fas fa-sliders-h"></i><span>Resistores</span></div>
        <div class="nav-item" onclick="loadTopic(2)"><i class="fas fa-database"></i><span>Condensadores</span></div>
        <div class="nav-item" onclick="loadTopic(3)"><i class="fas fa-exchange-alt"></i><span>Rectificadores</span></div>
        <div class="nav-item" onclick="loadTopic(4)"><i class="fas fa-microchip"></i><span>Transistores</span></div>
        <div class="nav-item" onclick="loadTopic(5)"><i class="fas fa-plug"></i><span>Tiristores / Triacs</span></div>
        <div class="nav-item" onclick="loadTopic(6)"><i class="fas fa-brain"></i><span>Circuitos Integrados</span></div>

        <div class="nav-section">Práctica</div>
        <div class="nav-item" onclick="loadTopic(7)"><i class="fas fa-project-diagram"></i><span>Proyectos</span></div>
        <div class="nav-item" onclick="loadTopic(8)"><i class="fas fa-shield-alt"></i><span>Seguridad</span></div>
        <div class="nav-item" onclick="loadTopic(9)"><i class="fas fa-laptop-code"></i><span>Simulación</span></div>
    </aside>

    <!-- Contenido Principal -->
    <main class="main" id="main-content">
        <!-- El contenido se inyecta aquí por JavaScript -->
    </main>

    <!-- Modal para Desafíos -->
    <div class="modal-overlay" id="modal">
        <div class="modal-content">
            <h3><i class="fas fa-lightbulb"></i> ¡Respuesta!</h3>
            <p id="modal-answer"></p>
            <button class="btn-close" onclick="closeModal()">Entendido</button>
        </div>
    </div>

    <script>
        // ==========================================
        // 🧠 BASE DE CONOCIMIENTO (DATA DUMP)
        // ==========================================
        const temas = [
            {
                titulo: "1. Electrónica Básica: El Río Invisible",
                intro: "Para que cualquier aparato funcione, necesitamos tres personajes principales. Piensa en un circuito como un sistema de tuberías.",
                definicion: "El <strong>Voltaje (V)</strong> es la presión que empuja el agua. La <strong>Corriente (I)</strong> es la cantidad de agua que fluye. La <strong>Resistencia (R)</strong> es un obstáculo en la tubería.",
                funcionamiento: "La Ley de Ohm (<strong>V = I x R</strong>) rige este universo. Si subes el Voltaje (presión) y la Resistencia no cambia, la Corriente (flujo) sube. Si subes la Resistencia (obstáculo), la Corriente baja.",
                ejemplo: "Tu cargador de celular: el enchufe tiene alto voltaje (120V/220V), pero el cargador usa resistencias y transformadores para bajarlo a 5V y limitar la corriente para que tu batería no explote.",
                imagen_url: "", // Dejar vacío para mostrar placeholder
                desafio: "Si tu cargador te da 5 Voltios y tu teléfono tiene una resistencia de 10 Ohmios, ¿Cuánta corriente (Amperios) fluye?",
                respuesta: "Usamos la Ley de Ohm: I = V / R. Entonces: I = 5V / 10Ω = 0.5 Amperios. ¡Fluyen 500 miliamperios por tu cable!"
            },
            {
                titulo: "2. Resistores: Los Frenos del Circuito",
                intro: "Los resistores son los héroes silenciosos. Sin ellos, la corriente iría sin control y quemaría todo.",
                definicion: "Son componentes diseñados para frenar la corriente. Hay <strong>Fijos</strong> (siempre frenan igual), <strong>Variables</strong> (como el volumen de tu radio) y <strong>No Lineales</strong> (sensores que reaccionan al entorno).",
                funcionamiento: "<strong>LDR:</strong> Le encanta la luz. En la oscuridad es un muro (alta resistencia), con luz abre la puerta (baja resistencia).<br><strong>NTC/PTC:</strong> Reaccionan al calor. NTC baja su resistencia si se calienta. PTC la sube drásticamente para proteger circuitos.",
                ejemplo: "Las lámparas solares de tu jardín usan una LDR para saber cuándo oscurece y encenderse. Las baterías de laptops usan PTC para cortar la corriente si se sobrecalientan.",
                imagen_url: "",
                desafio: "¿Qué resistor usarías para hacer un termómetro digital que necesite mayor conductividad (menor resistencia) al aumentar el calor?",
                respuesta: "Una NTC (Coeficiente Negativo de Temperatura). A más calor, su resistencia baja, permitiendo pasar más corriente que el microchip traduce en grados centígrados."
            },
            {
                titulo: "3. Condensadores: Los Tanques de Reserva",
                intro: "Imagina un globo que llenas de agua poco a poco y puedes reventar de golpe para sacar toda el agua. Eso es un condensador.",
                definicion: "Almacenan energía eléctrica y la liberan cuando se necesita. También sirven como filtros para limpiar señales 'sucias'.",
                funcionamiento: "Tienen dos placas separadas por un aislante. Los <strong>Electrolíticos</strong> guardan mucha energía pero son lentos y tienen polaridad (+ y -). Los <strong>Cerámicos</strong> guardan poca pero son rapidísimos.",
                ejemplo: "El flash de la cámara de tu celular: la batería no da tanta potencia de golpe, así que el condensador la guarda y ¡BAM! la suelta para el destello. También filtran la energía en los cargadores.",
                imagen_url: "",
                desafio: "¿Qué le pasa a un condensador electrolítico si lo conectas al revés (positivo donde va el negativo)?",
                respuesta: "El aislante interior se destruye, se crea un cortocircuito interno, el condensador se calienta, se hincha y puede explotar lanzando su contenido. ¡Siempre revisa la polaridad!"
            },
            {
                titulo: "4. Rectificadores: Los Guardias de Tráfico",
                intro: "La electricidad de la pared va y viene como las olas (Corriente Alterna). Tus aparatos necesitan que vaya en una sola dirección (Corriente Directa).",
                definicion: "Los diodos son válvulas antirretorno. Dejan pasar la corriente en un sentido (Ánodo a Cátodo) y la bloquean en el contrario.",
                funcionamiento: "Un diodo solo convierte la onda en media onda (corta la mitad). Un <strong>Puente Rectificador</strong> (4 diodos) es un grupo de guardias de tráfico que obligan a TODAS las olas a ir en la misma dirección.",
                ejemplo: "Ese bloque pesado en el cable de tu laptop es un puente rectificador convirtiendo la CA de la pared en CD para tu computadora. Los LEDs también son diodos que brillan al dejar pasar la corriente.",
                imagen_url: "",
                desafio: "Si conectas una batería directamente al Cátodo (la línea del símbolo) de un diodo, ¿se encenderá un LED?",
                respuesta: "No. El diodo actúa como un muro en esa dirección. La corriente debe entrar por el Ánodo (la flecha) y salir por el Cátodo para que el LED encienda."
            },
            {
                titulo: "5. Transistores: Los Interruptores Mágicos",
                intro: "El componente más importante del siglo XX. Sin él, no existirían las computadoras ni internet.",
                definicion: "Es un interruptor que se controla con electricidad, no con tu mano. También es un amplificador (un megáfono para señales débiles).",
                funcionamiento: "Tiene 3 patitas: Base, Colector y Emisor. Si le das un hilito de corriente a la Base, abre la compuerta para que pase un río de corriente del Colector al Emisor. Una corriente minúscula controla una gigante.",
                ejemplo: "Procesadores: Miles de millones de transistores encendiendo (1) y apagándose (0) crean el código binario de tus videojuegos. Amplificadores: Toman la señal débil de un micrófono y la convierten en el sonido de un concierto.",
                imagen_url: "",
                desafio: "Si un sensor LDR produce una corriente muy pequeñita al detectar luz, y queremos que encienda una luz gigante de neón, ¿qué componente necesitamos?",
                respuesta: "¡Un transistor! Actuará como amplificador. Tomará la señal débil del LDR en su Base, y dejará que la corriente grande del Colector encienda la luz de neón."
            },
            {
                titulo: "6. Tiristores y Triacs: Los Interruptores Pegajosos",
                intro: "Son primos de los transistores, pero tercos: una vez que los enciendes, se quedan encendidos aunque quites la señal.",
                definicion: "<strong>SCR:</strong> Deja pasar la corriente en una dirección y se queda pegado. <strong>Triac:</strong> Como dos SCR espalda con espalda, controla corriente que va y viene (CA).",
                funcionamiento: "Tienen una patita llamada Compuerta. Un pulsito ahí los enciende para siempre. Solo se apagan si cortas la energía principal (como una alarma de incendio).",
                ejemplo: "El 'dimmer' o regulador de la luz de tu sala usa un Triac. Gira la perilla y el Triac corta 'pedazos' de la onda eléctrica, haciendo que la bombilla reciba menos energía y brille menos.",
                imagen_url: "",
                desafio: "Diseña en tu mente una alarma de puerta con un SCR. ¿Cómo harías para apagar la alarma sin desconectar la batería principal?",
                respuesta: "Necesitarías un botón de 'Reset' que, al presionarlo, corte momentáneamente la corriente que pasa por el SCR. Al cortarse la energía un instante, el SCR se 'despega' y se apaga."
            },
            {
                titulo: "7. Circuitos Integrados: Ciudades Microscópicas",
                intro: "Imagina meter cientos de resistores, diodos y transistores en una pastilla del tamaño de tu uña. Eso es un CI o Microchip.",
                definicion: "Ciudades electrónicas completas miniaturizadas en silicio. No ves las calles internas, solo las autopistas que salen al exterior (los pines).",
                funcionamiento: "El <strong>Temporizador 555</strong> es como un metrónomo: hace parpadear luces o cuenta tiempos exactos si le pones resistores y condensadores afuera. Las <strong>Compuertas Lógicas</strong> son jueces: AND (enciende si A Y B), OR (enciende si A O B).",
                ejemplo: "El cerebro de tu smartphone o la placa de tu consola. Hasta el sensor de tu control que detecta cuando lo agitas es un pequeño CI.",
                imagen_url: "",
                desafio: "Estás haciendo una alarma de coche. Debe sonar si se abre la puerta O si se rompe el cristal. ¿Qué compuerta lógica necesitas?",
                respuesta: "Una compuerta OR (O). Con ella, si el sensor de la puerta se activa O el sensor del cristal se activa, la salida será 1 (encendido) y la alarma sonará."
            },
            {
                titulo: "8. Elaboración de Proyectos: Del Caos al Prototipo",
                intro: "Armar circuitos no es meter componentes al azar. Requiere un método ágil paso a paso.",
                definicion: "Metodología para pasar de una idea a un circuito funcional sin volverte loco.",
                funcionamiento: "<strong>1. Define</strong> el problema.<br><strong>2. Idea</strong> los componentes.<br><strong>3. Dibuja</strong> el esquemático.<br><strong>4. Simula</strong> primero (Tinkercad).<br><strong>5. Monta</strong> en Protoboard.<br><strong>6. Depura (Debug)</strong>: ¿No funciona? Revisa conexiones.",
                ejemplo: "Quieres una luz automática: Defines que necesitas LDR+Transistor+LED. Lo dibujas, lo pruebas en Tinkercad. Si explota en la PC, corriges. Luego lo armas físico. Si no enciende, depuras: ¿El transistor está al revés?",
                imagen_url: "",
                desafio: "Armas un circuito en la protoboard, lo conectas a la batería y... no pasa nada. ¿Cuál es el primer checklist que debes hacer?",
                respuesta: "1. ¿Está encendida la batería? 2. ¿Están los componentes en las filas correctas de la protoboard? 3. ¿El LED está al revés? 4. ¿Hay un cortocircuito? (Nunca asumas que el componente está quemado al principio)."
            },
            {
                titulo: "9. Seguridad: Reglas para no volverse un Resistor",
                intro: "La electricidad no se ve, pero muerde. Reglas de oro para adolescentes curiosos.",
                definicion: "Protocolos para experimentar sin sufrir quemaduras ni destruir componentes.",
                funcionamiento: "<strong>Regla 1:</strong> Nunca conectes directo a la pared (usar baterías 9V o menos).<br><strong>Regla 2:</strong> Cuidado con cortocircuitos (+ tocando -).<br><strong>Regla 3:</strong> Usa gafas (condensadores pueden explotar).<br><strong>Regla 4:</strong> Mano en el bolsillo si hay voltajes altos.<br><strong>Regla 5:</strong> ¿Huele a quemado? Corta la energía ya.",
                ejemplo: "Pones un condensador electrolítico al revés en un circuito de 12V. Se calienta, explota y te lanza trozos de aluminio a los ojos. Con gafas te salvaste la vista. Sin gafas, tendrías que ir al hospital.",
                imagen_url: "",
                desafio: "¿Por qué la regla de "mano en el bolsillo" es vital cuando se trabaja con voltajes altos?",
                respuesta: "Si tocas un cable vivo con una mano y estás apoyado en tierra, la corriente pasará de tu mano a tus pies. Si usas las dos manos y una toca vivo y la otra tierra, la corriente puede pasar por tu pecho y detener tu corazón."
            },
            {
                titulo: "10. Simulación: Tu Superpoder Oculto",
                intro: "Los ingenieros de Apple y NASA no sueldan a la primera. Se equivocan en la computadora. Tú también debes hacerlo.",
                definicion: "Usar software (como Tinkercad Circuits) para armar circuitos virtuales antes de gastar dinero y tiempo en lo físico.",
                funcionamiento: "Arrastras componentes, los conectas y le das a "Simular". Si hay un cortocircuito, el programa te avisa. Puedes ver la corriente fluyendo y los voltajes en tiempo real sin riesgo de quemaduras.",
                ejemplo: "Quieres armar una alarma con el chip 555. Lo intentas físico y no suena. ¿El chip está mal? ¿El cable? En Tinkercad, las conexiones son perfectas. Si no suena, es que tu lógica matemática está mal, no los componentes.",
                imagen_url: "",
                desafio: "¿Cuál es la principal ventaja de simular un circuito antes de armarlo físico respecto a la resolución de problemas (Debugging)?",
                respuesta: "Elimina las variables físicas (cables rotos, malos contactos, componentes defectuosos). Si el circuito no funciona en simulación, sabes al 100% que es un error de diseño o lógica, lo que te obliga a entender la teoría en lugar de simplemente mover cables al azar."
            }
        ];

        // ==========================================
        // 🎨 RENDERIZADO DINÁMICO
        // ==========================================
        let currentTopic = 0;

        function loadTopic(index) {
            currentTopic = index;
            const tema = temas[index];
            const mainContent = document.getElementById('main-content');
            
            // Actualizar Sidebar activa
            document.querySelectorAll('.nav-item').forEach((item, i) => {
                item.classList.toggle('active', i === index);
            });

            // Construir el HTML
            mainContent.innerHTML = `
                <div class="header">
                    <h1>${tema.titulo}</h1>
                    <p>${tema.intro}</p>
                </div>

                <div class="grid-container">
                    <!-- Imagen (Placeholder para GitHub) -->
                    <div class="card image-card">
                        ${tema.imagen_url 
                            ? `<img src="${tema.imagen_url}" alt="${tema.titulo}">` 
                            : `<div class="placeholder-img">
                                <i class="fas fa-image"></i>
                                <p>Espacio reservado para la imagen de GitHub</p>
                               </div>`
                        }
                    </div>

                    <!-- ¿Qué es? -->
                    <div class="card">
                        <div class="card-title"><i class="fas fa-question-circle"></i> ¿Qué es?</div>
                        <div class="card-text">${tema.definicion}</div>
                    </div>

                    <!-- ¿Cómo funciona? -->
                    <div class="card">
                        <div class="card-title"><i class="fas fa-cogs"></i> ¿Cómo funciona?</div>
                        <div class="card-text">${tema.funcionamiento}</div>
                    </div>

                    <!-- Ejemplo Real -->
                    <div class="card">
                        <div class="card-title"><i class="fas fa-globe-americas"></i> Ejemplo en el Mundo Real</div>
                        <div class="card-text">${tema.ejemplo}</div>
                    </div>

                    <!-- Desafío -->
                    <div class="card challenge-card">
                        <div class="card-title"><i class="fas fa-brain"></i> Desafío Mental</div>
                        <div class="card-text">${tema.desafio}</div>
                        <button class="btn-solve" onclick="showAnswer(${index})">
                            <i class="fas fa-key"></i> Ver Respuesta
                        </button>
                    </div>
                </div>
            `;
        }

        function showAnswer(index) {
            const modal = document.getElementById('modal');
            const answerText = document.getElementById('modal-answer');
            answerText.innerHTML = temas[index].respuesta;
            modal.style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        // Cerrar modal si se hace clic fuera
        window.onclick = function(event) {
            const modal = document.getElementById('modal');
            if (event.target == modal) {
                closeModal();
            }
        }

        // Inicializar la aplicación con el primer tema
        loadTopic(0);
    </script>
</body>
</html>
